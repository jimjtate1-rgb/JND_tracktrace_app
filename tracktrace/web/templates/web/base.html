{% load static %}
<!doctype html>
<html lang="en" data-theme="neon">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JND Track &amp; Trace — ocean &amp; air freight{% endblock %}</title>
  <meta name="description" content="JND Track & Trace: track ocean (bill of lading / container) and air (AWB) shipments — status, route, milestones and destination weather.">
  <meta name="theme-color" content="#07060f">
  <link rel="icon" type="image/png" href="{% static 'web/jnd-logo.png' %}">
  <script>
    (function(){try{var m=document.cookie.match(/(?:^|; )jnd_theme=([^;]+)/);
      var t=m?decodeURIComponent(m[1]):"neon";
      document.documentElement.setAttribute("data-theme", t==="light"?"light":"neon");
    }catch(e){document.documentElement.setAttribute("data-theme","neon");}})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'web/styles.css' %}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to results</a>
  <span id="sr-status" class="visually-hidden" role="status" aria-live="polite"></span>
  <header class="site-header">
    <div class="wrap">
      <a class="wordmark" href="{% url 'web:track' %}">
        <span class="logo-badge"><img class="logo" src="{% static 'web/jnd-logo.png' %}" alt="JND" width="111" height="64"></span>
        <span class="name">Track &amp; Trace</span>
      </a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="true" aria-label="Switch to light theme">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <span class="tt-label">Neon</span>
      </button>
    </div>
  </header>
  {% block content %}{% endblock %}
  <footer class="site-footer">
    <div class="wrap">
      <span>© 2026 JND Track &amp; Trace · Ocean &amp; air freight visibility</span>
      <span>Carrier coverage via <a href="https://touch.track-trace.com/bol">track-trace.com</a></span>
    </div>
  </footer>
  <script src="{% static 'web/app.js' %}"></script>
</body>
</html>
