<style>
/* Manifest / nautical-chart theme for ocean & air freight tracking. */
:root {
  --ink: #0B1F33;          /* deep maritime navy */
  --ink-2: #13314f;        /* raised navy */
  --paper: #F3F5F7;        /* cool page */
  --card: #FFFFFF;
  --line: #D6DEE6;
  --line-strong: #9fb0c0;
  --text: #0B1F33;
  --muted: #5a6b7b;
  --teal: #0EA5A8;         /* harbor accent */
  --teal-deep: #0b7e81;
  --focus: #ffb703;        /* high-contrast focus ring */

  --st-neutral-bg:#e7ecf1; --st-neutral-fg:#3f5168;
  --st-move-bg:#FEF1D6;   --st-move-fg:#8a5200;
  --st-arr-bg:#CFF7F4;    --st-arr-fg:#0b6b6e;
  --st-done-bg:#D8F3DF;   --st-done-fg:#1f7a3d;
  --st-late-bg:#FBE0DE;   --st-late-fg:#a32219;

  --r: 12px;
  --display: "Archivo", system-ui, -apple-system, "Segoe UI", sans-serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--body);
  color: var(--text);
  background: var(--paper);
  line-height: 1.55;
  font-size: 16px;
}

/* Accessibility helpers */
.skip-link {
  position: absolute; left: 12px; top: -48px;
  background: var(--ink); color: #fff; padding: 10px 16px;
  border-radius: 8px; z-index: 100; transition: top .15s ease;
  font-weight: 600; text-decoration: none;
}
.skip-link:focus { top: 12px; }
.visually-hidden {
  position: absolute !important; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}
:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 6px; }

a { color: var(--teal-deep); }

.wrap { width: 100%; max-width: 1060px; margin: 0 auto; padding: 0 20px; }

/* Header */
.site-header { background: var(--ink); color: #fff; }
.site-header .wrap { display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 16px; }
.wordmark { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; }
.wordmark .glyph { color: var(--teal); font-size: 22px; line-height: 1; }
.wordmark .name { font-family: var(--display); font-weight: 800; letter-spacing: .14em; font-size: 15px; text-transform: uppercase; }
.site-nav { display: flex; gap: 18px; font-size: 14px; }
.site-nav a { color: #c7d4e0; text-decoration: none; padding: 6px 2px; border-bottom: 2px solid transparent; }
.site-nav a:hover { color: #fff; border-color: var(--teal); }

/* Hero with faint chart grid */
.hero {
  background:
    linear-gradient(rgba(11,31,51,.92), rgba(11,31,51,.97)),
    repeating-linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 28px),
    var(--ink);
  color: #fff; padding: 46px 0 40px;
  border-bottom: 1px solid #06243d;
}
.hero h1 { font-family: var(--display); font-weight: 800; font-size: clamp(1.8rem, 4.5vw, 2.7rem); margin: 0 0 8px; letter-spacing: -.01em; }
.hero .lede { color: #b9c7d6; margin: 0 0 26px; max-width: 56ch; font-size: 1.02rem; }

/* Search form */
.search { display: grid; grid-template-columns: 1fr; gap: 14px; }
.search .row { display: grid; grid-template-columns: 1fr; gap: 14px; }
.field label { display: block; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: #9fb2c4; margin: 0 0 6px; font-weight: 600; }
.field input, .field select {
  width: 100%; font-family: var(--body); font-size: 16px; color: var(--ink);
  background: #fff; border: 1px solid transparent; border-radius: 10px; padding: 13px 14px;
}
.field input::placeholder { color: #8aa0b3; }
.search-actions { display: flex; gap: 12px; align-items: center; }
.btn {
  font-family: var(--display); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; font-size: 14px;
  background: var(--teal); color: #06262b; border: 0; border-radius: 10px;
  padding: 14px 22px; cursor: pointer;
}
.btn:hover { background: #16b9bc; }
.hint { color: #9fb2c4; font-size: 13px; }
.hint strong { color: #fff; font-family: var(--mono); font-weight: 500; }

/* Results */
main { padding: 30px 0 70px; }
.results-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin: 0 0 18px; flex-wrap: wrap; }
.results-head h2 { font-family: var(--display); font-weight: 700; font-size: 1.15rem; margin: 0; }
.count { color: var(--muted); font-size: 14px; font-family: var(--mono); }

.empty {
  background: var(--card); border: 1px dashed var(--line-strong); border-radius: var(--r);
  padding: 34px; text-align: center; color: var(--muted);
}
.empty h3 { font-family: var(--display); color: var(--ink); margin: 0 0 6px; }

/* Dossier card */
.dossier { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); margin: 0 0 22px; overflow: hidden; }
.dossier > * { padding-left: 22px; padding-right: 22px; }
.d-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding-top: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
.d-ref { font-family: var(--mono); font-weight: 600; font-size: 1.18rem; letter-spacing: .01em; }
.d-ref .ref-kind { display: block; font-family: var(--body); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 1px; }

.pill { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px; letter-spacing: .03em; white-space: nowrap; }
.pill.mode { background: var(--ink); color: #fff; text-transform: uppercase; letter-spacing: .08em; }
.pill.mode.air { background: var(--teal-deep); }
.pill.status { text-transform: capitalize; }
.s-neutral{background:var(--st-neutral-bg);color:var(--st-neutral-fg);}
.s-move{background:var(--st-move-bg);color:var(--st-move-fg);}
.s-arr{background:var(--st-arr-bg);color:var(--st-arr-fg);}
.s-done{background:var(--st-done-bg);color:var(--st-done-fg);}
.s-late{background:var(--st-late-bg);color:var(--st-late-fg);}

/* Route rail (signature) */
.route { padding-top: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--line); }
.route-ends { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
.node .port { font-weight: 600; font-size: .98rem; }
.node .code { font-family: var(--mono); font-size: 12px; color: var(--muted); display: block; }
.node.dest { text-align: right; }
.rail { position: relative; height: 4px; background: var(--line); border-radius: 4px; }
.rail .done { position: absolute; left: 0; top: 0; height: 100%; background: var(--teal); border-radius: 4px; }
.rail .via {
  position: absolute; top: 50%; width: 9px; height: 9px; border-radius: 50%;
  background: #fff; border: 2px solid var(--line-strong); transform: translate(-50%, -50%);
}
.rail .marker {
  position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
  background: var(--teal); border: 3px solid #fff; box-shadow: 0 0 0 1px var(--teal-deep);
  transform: translate(-50%, -50%);
}
.route-meta { display: flex; justify-content: space-between; margin-top: 12px; font-size: 13px; color: var(--muted); flex-wrap: wrap; gap: 8px; }
.route-meta .via-label { font-style: normal; }
.route-meta b, .route-meta time { color: var(--ink); font-family: var(--mono); font-weight: 500; }

/* Meta grid + sections */
.grid { display: grid; grid-template-columns: 1fr; gap: 16px 24px; padding-top: 18px; padding-bottom: 18px; }
.kv .k { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.kv .v { font-size: .98rem; }
.kv .v.mono { font-family: var(--mono); font-weight: 500; }

.block { padding-top: 18px; padding-bottom: 18px; border-top: 1px solid var(--line); }
.block h3 { font-family: var(--display); font-weight: 700; font-size: .82rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { font-family: var(--mono); font-size: 13px; background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; }
.chip .t { color: var(--muted); margin-left: 6px; font-family: var(--body); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }

.cargo { display: grid; gap: 8px; }
.cargo-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 14px; padding: 8px 0; border-bottom: 1px dotted var(--line); }
.cargo-row:last-child { border-bottom: 0; }
.cargo-row .desc { font-weight: 600; }
.cargo-row .hs { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.cargo-row .qty { font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap; }

.weather { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.weather .temp { font-family: var(--display); font-weight: 700; font-size: 1.5rem; }
.weather .where { color: var(--muted); font-size: 14px; }
.weather .wind { font-family: var(--mono); font-size: 13px; color: var(--muted); }

/* Timeline (signature) */
.timeline { list-style: none; margin: 0; padding: 4px 0 0; }
.timeline li { position: relative; padding: 0 0 20px 30px; }
.timeline li::before { content: ""; position: absolute; left: 6px; top: 4px; bottom: -4px; width: 2px; background: var(--line); }
.timeline li:last-child::before { display: none; }
.timeline .dot { position: absolute; left: 0; top: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--teal); border: 3px solid #fff; box-shadow: 0 0 0 1px var(--teal-deep); }
.timeline li.est .dot { background: #fff; box-shadow: 0 0 0 1px var(--line-strong); }
.timeline li.est::before { background-image: linear-gradient(var(--line-strong) 50%, transparent 50%); background-size: 2px 8px; background-color: transparent; }
.ev-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ev-time { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.ev-code { font-family: var(--mono); font-size: 11px; font-weight: 600; background: var(--ink); color: #fff; padding: 2px 7px; border-radius: 5px; letter-spacing: .04em; }
.ev-est { font-size: 11px; font-weight: 700; color: var(--st-move-fg); background: var(--st-move-bg); padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .05em; }
.ev-desc { margin: 3px 0 0; font-weight: 500; }
.ev-loc { color: var(--muted); font-size: 13px; }
.ev-loc .lc { font-family: var(--mono); }

/* Footer */
.site-footer { border-top: 1px solid var(--line); background: #fff; color: var(--muted); font-size: 13px; }
.site-footer .wrap { padding-top: 22px; padding-bottom: 30px; display: flex; gap: 14px; justify-content: space-between; flex-wrap: wrap; }
.site-footer a { color: var(--teal-deep); }

@media (min-width: 620px) {
  .search .row { grid-template-columns: 2fr 1fr 1.4fr; align-items: end; }
  .grid { grid-template-columns: repeat(2, 1fr); }
  .grid.four { grid-template-columns: repeat(4, 1fr); }
}

@media (prefers-reduced-motion: no-preference) {
  .dossier { animation: rise .4s ease both; }
  .rail .done, .rail .marker { transition: left .6s cubic-bezier(.2,.7,.2,1), width .6s cubic-bezier(.2,.7,.2,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
}

/* ============================================================
   JND — Miami neon dark theme + copy/toggle components
   Light "manifest" theme = :root above. Neon = [data-theme="neon"].
   ============================================================ */

/* Brand wordmark (both themes) */
.brand-jnd {
  font-family: var(--display); font-weight: 800; font-size: 17px; letter-spacing: .04em;
  background: linear-gradient(95deg, #ff2d95, #ff8a3d 55%, #05d9e8);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.wordmark .name { font-family: var(--display); font-weight: 700; letter-spacing: .14em; font-size: 13px; text-transform: uppercase; color: #c7d4e0; }

/* Theme toggle */
.theme-toggle {
  display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
  background: transparent; color: #c7d4e0; border: 1px solid #36506b; border-radius: 999px;
  padding: 6px 13px; font: 600 13px var(--body);
}
.theme-toggle:hover { color: #fff; border-color: var(--teal); }
.theme-toggle .ic { width: 15px; height: 15px; }

/* Copy buttons */
.d-ref-wrap { display: flex; align-items: center; gap: 8px; margin-right: auto; flex-wrap: wrap; }
.copy-btn {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  background: transparent; border: 1px solid var(--line); border-radius: 8px;
  color: var(--muted); padding: 5px 9px; font: 600 12px var(--body); vertical-align: middle;
}
.copy-btn:hover { color: var(--text); border-color: var(--line-strong); }
.copy-btn:active { transform: translateY(1px); }
.copy-btn .ic { width: 14px; height: 14px; }
.copy-btn.is-copied { color: var(--st-done-fg); border-color: currentColor; }
button.chip { font: 500 13px var(--mono); text-align: left; cursor: pointer; color: var(--text); }
.chip-btn:hover { border-color: var(--line-strong); }

/* ---------- NEON THEME ---------- */
[data-theme="neon"] {
  --ink: #07060f;
  --ink-2: #15132e;
  --paper: #0a0a16;
  --card: #14122c;
  --line: #2a2750;
  --line-strong: #4a4575;
  --text: #F2EEFF;
  --muted: #9d97c7;
  --teal: #ff2d95;          /* primary neon (pink) */
  --teal-deep: #ff5cae;
  --focus: #ffd23f;
  --cyan: #05d9e8;
  --purple: #b14eff;

  --st-neutral-bg: rgba(255,255,255,.07); --st-neutral-fg:#bdb7e6;
  --st-move-bg: rgba(5,217,232,.15);      --st-move-fg:#6ef0ff;
  --st-arr-bg: rgba(177,78,255,.18);      --st-arr-fg:#d2adff;
  --st-done-bg: rgba(61,245,160,.15);     --st-done-fg:#5ff7b4;
  --st-late-bg: rgba(255,84,112,.18);     --st-late-fg:#ff90a4;
}
[data-theme="neon"] body {
  background:
    radial-gradient(1100px 480px at 50% -220px, rgba(255,45,149,.20), transparent 62%),
    radial-gradient(820px 460px at 88% -40px, rgba(5,217,232,.12), transparent 60%),
    var(--paper);
  background-attachment: fixed;
}
[data-theme="neon"] .site-header { background: rgba(7,6,15,.92); border-bottom: 1px solid var(--line); }
[data-theme="neon"] .hero {
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.045) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.045) 0 1px, transparent 1px 28px),
    linear-gradient(180deg, rgba(10,10,22,.35), rgba(10,10,22,.86)),
    linear-gradient(120deg, #ff2d95 0%, #b14eff 46%, #1b2a6b 100%),
    var(--ink);
  border-bottom: 1px solid rgba(255,45,149,.45);
}
[data-theme="neon"] .hero h1 {
  background: linear-gradient(92deg, #ff2d95, #ff8a3d 50%, #05d9e8);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  text-shadow: 0 0 38px rgba(255,45,149,.35);
}
[data-theme="neon"] .hero .lede { color: #d9d2ff; }
[data-theme="neon"] .field label { color: #cdbbe6; }
[data-theme="neon"] .btn {
  background: linear-gradient(95deg, #ff2d95, #ff5cae); color: #0a0a16;
  box-shadow: 0 0 22px rgba(255,45,149,.5);
}
[data-theme="neon"] .btn:hover { background: linear-gradient(95deg, #ff4da6, #ff79c0); box-shadow: 0 0 30px rgba(255,45,149,.7); }
[data-theme="neon"] .hint strong { color: #6ef0ff; }
[data-theme="neon"] a { color: #6ef0ff; }
[data-theme="neon"] .results-head h2,
[data-theme="neon"] .empty h3,
[data-theme="neon"] .weather .temp { color: var(--text); }

[data-theme="neon"] .pill.mode { background: linear-gradient(95deg, #ff2d95, #b14eff); color: #fff; box-shadow: 0 0 14px rgba(255,45,149,.45); }
[data-theme="neon"] .pill.mode.air { background: linear-gradient(95deg, #05d9e8, #b14eff); color: #04141a; }

[data-theme="neon"] .rail { background: rgba(255,255,255,.10); }
[data-theme="neon"] .rail .done { background: linear-gradient(90deg, #b14eff, #ff2d95); box-shadow: 0 0 12px rgba(255,45,149,.6); }
[data-theme="neon"] .rail .marker { background: #ff2d95; border-color: #14122c; box-shadow: 0 0 0 1px #ff2d95, 0 0 16px rgba(255,45,149,.85); }
[data-theme="neon"] .rail .via { background: #14122c; border-color: var(--cyan); }

[data-theme="neon"] .chip { background: rgba(255,255,255,.04); }
[data-theme="neon"] button.chip { color: var(--text); }
[data-theme="neon"] .ev-code { background: rgba(255,45,149,.16); color: #ff9ecb; border: 1px solid rgba(255,45,149,.4); }
[data-theme="neon"] .timeline .dot { background: #ff2d95; border-color: #14122c; box-shadow: 0 0 0 1px #ff2d95, 0 0 10px rgba(255,45,149,.7); }
[data-theme="neon"] .timeline li:not(.est)::before { background: linear-gradient(#ff2d95, #b14eff); }
[data-theme="neon"] .site-footer { background: rgba(7,6,15,.6); border-top: 1px solid var(--line); }

[data-theme="neon"] .theme-toggle { border-color: rgba(255,45,149,.55); color: #f2eeff; }
[data-theme="neon"] .theme-toggle:hover { border-color: #ff2d95; box-shadow: 0 0 14px rgba(255,45,149,.5); color: #fff; }
[data-theme="neon"] .copy-btn:hover { border-color: #ff2d95; color: #ff9ecb; box-shadow: 0 0 12px rgba(255,45,149,.4); }
[data-theme="neon"] .chip-btn:hover { border-color: var(--cyan); box-shadow: 0 0 12px rgba(5,217,232,.4); }

@media (prefers-reduced-motion: no-preference) {
  [data-theme="neon"] .rail .marker { animation: pulse 2.2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 1px #ff2d95, 0 0 12px rgba(255,45,149,.7); }
    50%     { box-shadow: 0 0 0 1px #ff2d95, 0 0 22px rgba(255,45,149,1); }
  }
}

/* JND logo lockup (logo sits in a white badge so it reads on dark headers) */
.wordmark .logo-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #fff; border-radius: 8px; padding: 5px 9px; line-height: 0;
}
.wordmark .logo { height: 26px; width: auto; display: block; }
[data-theme="neon"] .wordmark .logo-badge { box-shadow: 0 0 16px rgba(255, 45, 149, .4); }

</style>

}
function run(){const q=document.getElementById("q").value, mode=document.getElementById("mode").value, carrier=document.getElementById("carrier").value;
  const det=detect(q); document.getElementById("hint").innerHTML = det ? 'Detected carrier: <strong>'+esc(det.name)+' ('+esc(det.scac)+')</strong>' : "";
  render(DB.shipments.filter(s=>match(s,q,mode,carrier)));}
function reset(){document.getElementById("q").value="";document.getElementById("mode").value="";document.getElementById("carrier").value="";document.getElementById("hint").textContent="";render(DB.shipments);}
(function(){var root=document.documentElement;
  function setCookie(v){try{document.cookie="jnd_theme="+v+";path=/;max-age=31536000;samesite=lax";}catch(e){}}
  function current(){return root.getAttribute("data-theme")==="light"?"light":"neon";}
  function apply(t){root.setAttribute("data-theme",t);var b=document.getElementById("theme-toggle");if(!b)return;var neon=t==="neon";
    b.setAttribute("aria-pressed",String(neon));b.setAttribute("aria-label",neon?"Switch to light theme":"Switch to neon theme");
    var l=b.querySelector(".tt-label");if(l)l.textContent=neon?"Neon":"Light";}
  var t=document.getElementById("theme-toggle");
  if(t){apply(current());t.addEventListener("click",function(){var n=current()==="neon"?"light":"neon";apply(n);setCookie(n);});}
  var sr=document.getElementById("sr-status");
  function announce(m){if(!sr)return;sr.textContent="";setTimeout(function(){sr.textContent=m;},30);}
  function flash(btn,ok){var l=btn.querySelector(".copy-label");var p=l?l.textContent:"";if(l)l.textContent=ok?"Copied":"Press Ctrl+C";
    btn.classList.toggle("is-copied",ok);announce(ok?"Copied "+(btn.getAttribute("data-copy")||""):"Copy failed. Press Control C.");
    setTimeout(function(){if(l)l.textContent=p;btn.classList.remove("is-copied");},1600);}
  function copy(text,btn){function fb(){try{var ta=document.createElement("textarea");ta.value=text;ta.setAttribute("readonly","");
    ta.style.position="fixed";ta.style.top="-1000px";document.body.appendChild(ta);ta.select();var ok=document.execCommand("copy");
    document.body.removeChild(ta);flash(btn,ok);}catch(e){flash(btn,false);}}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){flash(btn,true);},fb);}else{fb();}}
  document.addEventListener("click",function(e){var b=e.target.closest("[data-copy]");if(!b)return;e.preventDefault();copy(b.getAttribute("data-copy"),b);});
})();
render(DB.shipments);
</script>
